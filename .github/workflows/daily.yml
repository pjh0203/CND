name: Daily Delivery (Guardian, NYT)

on:
  workflow_dispatch:
  # Scheduled delivery paused. Re-enable by uncommenting the schedule below.
  # schedule:
  #   # 00:00 UTC every day. Adjust with: UTC = Local - Offset (UTC+8 06:00 -> '0 22 * * *')
  #   - cron: '0 0 * * *'

permissions:
  contents: read

jobs:
  deliver:
    uses: ./.github/workflows/calibre-news.yml
    with:
      recipe_list: recipe_daily.txt
      audience: news
    secrets: inherit
